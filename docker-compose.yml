# Resiliencia 24/7:
#  - restart: unless-stopped en todos los servicios de larga duración: si un
#    contenedor muere (OOM, crash, error), Docker lo relanza automáticamente.
#  - healthcheck en postgres y redis: los dependientes esperan a que estén sanos.
#  - stop_grace_period en los workers: al parar/reiniciar, dan tiempo a que el
#    job en curso termine antes de recibir SIGKILL (apagado elegante de queue:work).
#  - Los workers se autoreciclan con --max-time / --max-jobs (evitan fugas de
#    memoria) y Docker los vuelve a levantar limpios.

x-app: &app-base
  build: .
  volumes:
    - .:/app
  env_file:
    - .env
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  web:
    image: nginx:alpine
    ports:
      - "${APP_PUBLISH_PORT:-8000}:80"
    volumes:
      - .:/app
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    restart: unless-stopped
    depends_on:
      - app

  app:
    <<: *app-base
    mem_limit: 512m
    cpus: 1.0

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: outreach
      POSTGRES_USER: outreach
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U outreach"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  scheduler:
    <<: *app-base
    command: sh -c "sleep 20 && php artisan schedule:work"
    mem_limit: 256m

  queue-default:
    <<: *app-base
    command: sh -c "sleep 20 && php artisan queue:work --queue=default --tries=3 --backoff=30 --timeout=300 --max-jobs=200 --max-time=3600 --rest=1 --memory=320"
    mem_limit: 384m
    stop_grace_period: 330s

  queue-scraping:
    <<: *app-base
    command: sh -c "sleep 20 && php artisan queue:work --queue=scraping --tries=3 --backoff=30 --timeout=180 --max-jobs=100 --max-time=1800 --rest=1 --memory=192"
    mem_limit: 256m
    stop_grace_period: 210s

  queue-scraping-2:
    <<: *app-base
    command: sh -c "sleep 20 && php artisan queue:work --queue=scraping --tries=3 --backoff=30 --timeout=180 --max-jobs=100 --max-time=1800 --rest=1 --memory=192"
    mem_limit: 256m
    stop_grace_period: 210s

  queue-envio:
    <<: *app-base
    command: sh -c "sleep 20 && php artisan queue:work --queue=envio --tries=1 --timeout=120 --max-jobs=100 --max-time=3600 --rest=1 --memory=192"
    mem_limit: 256m
    stop_grace_period: 150s

  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
    restart: unless-stopped
    profiles:
      - dev

volumes:
  pgdata:
  redisdata:
